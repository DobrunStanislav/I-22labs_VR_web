<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Three.js Відео Текстура</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; text-align: center; }
        #info { position: absolute; top: 15px; width: 100%; z-index: 100; pointer-events: none; }
        a { color: #00ffcc; pointer-events: auto; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="info">
        <a href="index.html">🔙 Повернутися на титульну сторінку</a><br><br>
        <em>Натисніть у будь-якому місці екрана, щоб запустити відео</em>
    </div>

    <video id="video" loop crossOrigin="anonymous" playsinline style="display:none">
        <source src="video.mp4" type="video/mp4">
    </video>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let camera, scene, renderer, video;

        init();
        animate();

        function init() {
            // Налаштування камери
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 5;

            // Створення сцени
            scene = new THREE.Scene();

            // Отримання відео
            video = document.getElementById('video');
            
            // Сучасні браузери блокують автовідтворення відео зі звуком, тому запускаємо по кліку
            document.body.addEventListener('click', () => {
                video.play();
            });

            // Створення відео-текстури
            const texture = new THREE.VideoTexture(video);
            texture.colorSpace = THREE.SRGBColorSpace;

            // Створення геометрії та матеріалу
            const geometry = new THREE.BoxGeometry(3, 2, 3);
            const material = new THREE.MeshBasicMaterial({ map: texture });

            // Додавання об'єкта на сцену
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Налаштування рендерера
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Обертання об'єкта
            scene.children[0].rotation.x += 0.005;
            scene.children[0].rotation.y += 0.01;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
