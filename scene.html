<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Three.js Відео Текстура</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: sans-serif; text-align: center; }
        #info { position: absolute; top: 15px; width: 100%; z-index: 100; pointer-events: none; }
        a { color: #00ffcc; pointer-events: auto; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="info">
        <a href="index.html">🔙 Повернутися на титульну сторінку</a><br><br>
        <em>Натисніть у будь-якому місці екрана, щоб запустити відео</em>
    </div>

    <video id="video" loop muted autoplay playsinline crossOrigin="anonymous" style="display:none">
        <source src="https://threejs.org/examples/textures/sintel.mp4" type="video/mp4">
    </video>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let camera, scene, renderer, video;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 5;

            scene = new THREE.Scene();
            // Робимо фон сірим, щоб куб не зливався
            scene.background = new THREE.Color(0x444444); 

            video = document.getElementById('video');
            
            document.body.addEventListener('click', () => {
                video.play();
            });

            const texture = new THREE.VideoTexture(video);
            texture.colorSpace = THREE.SRGBColorSpace;

            const geometry = new THREE.BoxGeometry(3, 2, 3);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff, map: texture });

            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Додаємо неонову зелену рамку навколо куба
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ff00 }));
            mesh.add(line);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            scene.children[0].rotation.x += 0.005;
            scene.children[0].rotation.y += 0.01;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
